<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forsyth Schools Portal</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="portal">
      <header class="portal-header">
        <img src="assets/icons/logo-popup.png" alt="Forsyth County Schools" class="portal-logo" width="28" height="28" />
        <div class="portal-header-text">
          <h1 class="portal-title">Forsyth Portal</h1>
          <p id="welcome-heading" class="welcome-heading">Loading…</p>
        </div>
      </header>

      <section id="welcome-section" class="welcome-section" aria-live="polite">
        <div id="loading-state" class="loading-state">
          <div class="spinner" aria-hidden="true"></div>
        </div>
        <p id="welcome-message" class="welcome-message hidden"></p>
        <div id="error-state" class="error-state hidden">
          <p>Could not load dashboard.</p>
        </div>
      </section>

      <main class="cards-grid" id="cards-grid"></main>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
