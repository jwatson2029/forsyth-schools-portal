<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forsyth Schools Portal</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="portal">
      <header class="portal-header">
        <div class="portal-brand">
          <img
            src="assets/icons/icon48.png"
            alt=""
            class="portal-logo"
            width="32"
            height="32"
          />
          <div>
            <h1 class="portal-title">Forsyth Schools Portal</h1>
            <p class="portal-subtitle">Your school tools in one place</p>
          </div>
        </div>
      </header>

      <section id="welcome-section" class="welcome-section" aria-live="polite">
        <div id="loading-state" class="loading-state">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading your dashboard…</p>
        </div>

        <div id="welcome-content" class="welcome-content hidden">
          <h2 id="welcome-heading" class="welcome-heading"></h2>
          <p id="welcome-message" class="welcome-message"></p>
        </div>

        <div id="error-state" class="error-state hidden">
          <p>Something went wrong loading your dashboard. Please try again.</p>
        </div>
      </section>

      <main class="cards-grid" id="cards-grid">
        <!-- Cards rendered by popup.js -->
      </main>

      <footer class="portal-footer">
        <p>Forsyth County Schools</p>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
